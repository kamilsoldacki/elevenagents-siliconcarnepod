<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Silicon Carné: Gemini Flash + ElevenAgents voice agents." />
  <title>Silicon Carné — voice demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #060606;
      --bg-elevated: #0c0c0c;
      --panel: #0f0f0f;
      --border: #242424;
      --text: #f4f4f5;
      --muted: #9ca3af;
      --accent: #e50914;
      --accent-hover: #ff1a26;
      --accent-dim: rgba(229, 9, 20, 0.14);
      --radius: 12px;
      --font: "Inter", ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      --display: "Bebas Neue", Impact, "Arial Narrow", sans-serif;
      --mono: ui-monospace, "SF Mono", Menlo, Monaco, "Cascadia Code", monospace;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; font-family: var(--font); background: var(--bg); color: var(--text); }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      opacity: 0.07;
      background-image: radial-gradient(circle, #fff 1px, transparent 1px);
      background-size: 6px 6px;
    }

    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: clamp(1rem, 3vw, 2rem);
      max-width: 1280px;
      margin: 0 auto;
      transition: filter 0.45s ease, opacity 0.45s ease;
    }

    #pageContent.in-call {
      filter: brightness(0.28) saturate(0.85);
      opacity: 0.55;
      pointer-events: none;
    }

    .hero-banner {
      width: 100%;
      max-height: min(220px, 28vw);
      object-fit: cover;
      object-position: center;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      margin-bottom: 1.25rem;
      display: block;
      background: var(--bg-elevated);
    }

    .hero-banner[hidden] {
      display: none;
      margin-bottom: 0;
    }

    .brand-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 1rem 1.25rem;
      margin-bottom: 1rem;
    }

    .brand-logo {
      width: clamp(72px, 14vw, 104px);
      height: auto;
      flex-shrink: 0;
      filter: drop-shadow(0 4px 24px rgba(229, 9, 20, 0.35));
    }

    header {
      margin-bottom: 0.5rem;
      flex: 1;
      min-width: 0;
    }

    header h1 {
      font-family: var(--display);
      font-size: clamp(2rem, 5vw, 2.75rem);
      font-weight: 400;
      letter-spacing: 0.04em;
      margin: 0;
      line-height: 1;
      color: var(--text);
    }

    header h1 span {
      color: var(--accent);
    }

    .intro-banner {
      margin: 0.65rem 0 0;
      padding: 0.75rem 1rem 0.85rem;
      max-width: 52rem;
      background: rgba(229, 9, 20, 0.08);
      border: 1px solid rgba(229, 9, 20, 0.22);
      border-left: 3px solid var(--accent);
      border-radius: 0 10px 10px 0;
    }

    .intro-banner .tagline {
      margin: 0;
      font-size: 0.9rem;
      color: var(--text);
      font-weight: 500;
      line-height: 1.45;
    }

    .intro-banner .header-note {
      margin: 0.55rem 0 0;
      font-size: 0.78rem;
      color: var(--muted);
      line-height: 1.45;
    }

    .split {
      flex: 1 1 0%;
      min-height: 0;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: minmax(0, 1fr);
      gap: clamp(1rem, 2vw, 1.75rem);
      min-height: min(70vh, 640px);
    }

    @media (max-width: 900px) {
      .split {
        grid-template-columns: 1fr;
        grid-template-rows: none;
      }
    }

    .panel {
      min-width: 0;
      min-height: 0;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: clamp(1rem, 2vw, 1.35rem);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.02) inset;
    }

    .panel-label {
      font-family: var(--display);
      font-size: 0.95rem;
      letter-spacing: 0.14em;
      color: var(--accent);
      margin-bottom: 0.35rem;
    }

    .panel > .panel-label + textarea.prompt,
    .panel > .panel-label + .agents-grid {
      margin-top: 0.5rem;
    }

    textarea.prompt {
      flex: 1 1 auto;
      min-height: 0;
      width: 100%;
      resize: none;
      overflow-y: auto;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: #080808;
      color: var(--text);
      font-family: var(--mono);
      font-size: 0.8125rem;
      line-height: 1.55;
      padding: 1rem;
    }

    textarea.prompt:focus {
      outline: 2px solid var(--accent-dim);
      border-color: rgba(229, 9, 20, 0.45);
    }

    .hint {
      margin-top: 0.75rem;
      font-size: 0.78rem;
      color: var(--muted);
      line-height: 1.45;
    }

    .hint a {
      color: var(--accent);
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .agents-grid {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      justify-content: flex-start;
      gap: clamp(0.85rem, 2vw, 1.15rem);
      overflow-y: auto;
    }

    #callOverlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 400;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      padding: 1.5rem;
      background: rgba(4, 4, 4, 0.92);
      backdrop-filter: blur(14px);
    }

    #callOverlay.active {
      display: flex;
    }

    #callCard {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.65rem;
      text-align: center;
      animation: callCardIn 0.38s cubic-bezier(0.34, 1.35, 0.64, 1);
    }

    @keyframes callCardIn {
      from {
        opacity: 0;
        transform: scale(0.9) translateY(12px);
      }
      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    #callAvatarWrap {
      position: relative;
      width: 120px;
      height: 120px;
      margin-bottom: 0.25rem;
    }

    #callAvatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid rgba(229, 9, 20, 0.45);
      display: block;
      background: #111;
    }

    #callRing {
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      border: 2px solid rgba(229, 9, 20, 0.2);
      opacity: 0;
      transition: opacity 0.25s;
      pointer-events: none;
    }

    #callRing.speaking {
      opacity: 1;
      animation: callRingPulse 1.35s ease-in-out infinite;
    }

    @keyframes callRingPulse {
      0%,
      100% {
        transform: scale(1);
        border-color: rgba(229, 9, 20, 0.65);
      }
      50% {
        transform: scale(1.06);
        border-color: rgba(229, 9, 20, 0.15);
      }
    }

    #callName {
      font-family: var(--display);
      font-size: clamp(1.5rem, 4vw, 2rem);
      font-weight: 400;
      letter-spacing: 0.06em;
      margin: 0;
      color: var(--text);
    }

    #callMode {
      margin: 0;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      min-height: 1.25em;
    }

    #callMode.speaking {
      color: #ff6b6b;
    }

    #endCallBtn {
      margin-top: 0.5rem;
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      background: var(--accent);
      border: none;
      border-radius: 999px;
      padding: 0.65rem 1.35rem;
      font-family: var(--font);
      font-size: 0.82rem;
      font-weight: 600;
      color: #fff;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
    }

    #endCallBtn:hover {
      background: var(--accent-hover);
      transform: scale(1.04);
    }

    #endCallBtn svg {
      width: 16px;
      height: 16px;
      fill: currentColor;
    }

    .agent-card {
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: clamp(1.1rem, 2.8vw, 1.5rem) clamp(1rem, 2.5vw, 1.35rem);
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: clamp(0.85rem, 2vw, 1.1rem);
      flex: 1 1 0;
      min-height: clamp(7rem, 16vh, 8.5rem);
      transition: border-color 0.15s, background 0.15s, box-shadow 0.15s;
      cursor: default;
    }

    .agent-card:hover {
      border-color: rgba(229, 9, 20, 0.45);
      background: #0d0d0d;
      box-shadow: 0 0 0 1px rgba(229, 9, 20, 0.12);
    }

    .agent-meta {
      flex: 0 0 auto;
      min-width: 0;
      text-align: center;
    }
    .agent-meta strong {
      display: block;
      font-family: var(--display);
      font-size: clamp(1.65rem, 5vw, 2.35rem);
      font-weight: 400;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      line-height: 1.05;
    }

    .btn-voice {
      flex: 1 1 auto;
      width: 100%;
      min-height: clamp(3.25rem, 10vw, 4.25rem);
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--accent-dim);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.12s, background 0.12s, border-color 0.12s;
      font-size: clamp(1.85rem, 5.5vw, 2.5rem);
      line-height: 1;
      padding: 0;
    }

    .btn-voice:hover {
      background: rgba(229, 9, 20, 0.28);
      border-color: var(--accent);
      transform: scale(1.04);
    }

    .btn-voice:active { transform: scale(0.98); }

  </style>
</head>
<body>
  <div class="page" id="pageContent">
    <img
      class="hero-banner"
      src="images/silicon-carne-hero.jpg"
      alt="Silicon Carné show art"
      width="2048"
      height="339"
      loading="eager"
      decoding="async"
    />

    <div class="brand-row">
      <a href="https://www.siliconcarne.co/" target="_blank" rel="noopener noreferrer" aria-label="Silicon Carné website">
        <img class="brand-logo" src="https://www.siliconcarne.co/images/prod/logo.png" alt="Silicon Carné logo" width="200" height="200" />
      </a>
      <header>
        <h1>Silicon Carné <span>·</span> Voice demo</h1>
        <div class="intro-banner">
          <p class="tagline">Gemini + ElevenAgents - same voice, same LLM, same setup</p>
          <p class="header-note">
            Only the ElevenLabs model changes: Flash in one version, Multilingual in the other.
          </p>
        </div>
      </header>
    </div>

    <div class="split">
      <section class="panel" aria-label="System prompt">
        <span class="panel-label">System prompt</span>
        <textarea
          class="prompt"
          id="prompt"
          spellcheck="false"
          readonly
          aria-label="System prompt in Markdown"
          placeholder="Loading prompt from silicon_carne_system_prompt_no_v3.md…"
        ></textarea>
        <p class="hint" id="prompt-status"></p>
      </section>

      <section class="panel" aria-label="Agent picker">
        <span class="panel-label">Talk</span>
        <div class="agents-grid" id="agents-grid"></div>
      </section>
    </div>
  </div>

  <div id="callOverlay" role="dialog" aria-modal="true" aria-labelledby="callName" aria-hidden="true">
    <div id="callCard">
      <div id="callAvatarWrap">
        <img
          id="callAvatar"
          src="https://www.siliconcarne.co/images/prod/logo.png"
          alt="Silicon Carné"
          width="200"
          height="200"
        />
        <div id="callRing" aria-hidden="true"></div>
      </div>
      <h2 id="callName"></h2>
      <p id="callMode">Connecting…</p>
      <button type="button" id="endCallBtn" title="End call">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1-9.4 0-17-7.6-17-17 0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1L6.6 10.8z"/></svg>
        End call
      </button>
    </div>
  </div>

  <script>
    const HERO_REMOTE_FALLBACK =
      "https://yt3.googleusercontent.com/l2zO7DVXDgk_ZvjY7Z3wNK4zeJdB0NbMI8laXl2BXxHmLOIUPQPOQ1lfbPpwv8u8dU2KS7CAxA=w2276-fcrop64=1,00005a57ffffa5a8-k-c0xffffffff-no-nd-rj";

    (function initHeroBanner() {
      const img = document.querySelector(".hero-banner");
      if (!img) return;
      img.addEventListener("error", function onHeroError() {
        const step = img.dataset.heroFallbackStep || "0";
        if (step === "0" && HERO_REMOTE_FALLBACK) {
          img.dataset.heroFallbackStep = "1";
          img.src = HERO_REMOTE_FALLBACK;
          return;
        }
        img.removeEventListener("error", onHeroError);
        img.hidden = true;
      });
    })();

    const PROMPT_URL = "./silicon_carne_system_prompt_no_v3.md";

    let promptBody = null;

    const AGENTS = [
      {
        agentId: "agent_7401kp3et1xqf2fa7wgzwd1cyq27",
        branchId: "agtbrch_2901kp3et262ex0vejpe5mzw4n19",
        name: "Flash",
        talkTo:
          "https://elevenlabs.io/app/talk-to?agent_id=agent_7401kp3et1xqf2fa7wgzwd1cyq27&branch_id=agtbrch_2901kp3et262ex0vejpe5mzw4n19"
      },
      {
        agentId: "agent_2101kp3rcv0ce6grj1q2w5xc35x0",
        branchId: "agtbrch_9701kp3rcv9yfet8z8azqyfwpyz0",
        name: "Multilingual",
        talkTo:
          "https://elevenlabs.io/app/talk-to?agent_id=agent_2101kp3rcv0ce6grj1q2w5xc35x0&branch_id=agtbrch_9701kp3rcv9yfet8z8azqyfwpyz0"
      }
    ];

    const grid = document.getElementById("agents-grid");
    const pageContent = document.getElementById("pageContent");
    const callOverlay = document.getElementById("callOverlay");
    const callName = document.getElementById("callName");
    const callMode = document.getElementById("callMode");
    const callRing = document.getElementById("callRing");
    const endCallBtn = document.getElementById("endCallBtn");
    const promptEl = document.getElementById("prompt");
    const promptStatus = document.getElementById("prompt-status");

    let activeConversation = null;

    function loadPrompt() {
      return fetch(PROMPT_URL)
        .then((r) => {
          if (!r.ok) throw new Error(r.status + " " + r.statusText);
          return r.text();
        })
        .then((text) => {
          promptBody = text;
          promptEl.value = text;
        })
        .catch(() => {
          promptBody = null;
          promptEl.value = "";
        })
        .then(() => {
          if (promptBody != null) {
            promptStatus.textContent = "";
          } else {
            promptStatus.innerHTML =
              "Prompt file missing — serve over HTTP (e.g. <code>npx serve .</code> or GitHub Pages). Keep <code>silicon_carne_system_prompt_no_v3.md</code> next to <code>index.html</code>.";
          }
        });
    }

    void loadPrompt();

    function isPlaceholder(id) {
      return !id || /^YOUR_AGENT_ID/i.test(id) || id.includes(" ");
    }

    async function endVoiceSession() {
      const c = activeConversation;
      activeConversation = null;
      if (c) {
        try {
          await c.endSession();
        } catch (_) {}
      }
      pageContent.classList.remove("in-call");
      callOverlay.classList.remove("active");
      callOverlay.setAttribute("aria-hidden", "true");
    }

    async function startVoiceSession(agent) {
      if (activeConversation) await endVoiceSession();

      if (isPlaceholder(agent.agentId)) {
        window.alert("Set a valid agentId in AGENTS in index.html.");
        return;
      }

      callName.textContent = agent.name;
      callMode.textContent = "Connecting…";
      callMode.className = "";
      callRing.className = "";

      pageContent.classList.add("in-call");
      callOverlay.classList.add("active");
      callOverlay.setAttribute("aria-hidden", "false");

      try {
        const { Conversation } = await import("https://esm.sh/@11labs/client@0.2.0");
        const opts = {
          agentId: agent.agentId,
          onConnect: () => {
            callMode.textContent = "Listening…";
          },
          onDisconnect: () => {
            void endVoiceSession();
          },
          onError: (msg, ctx) => {
            console.error(msg, ctx);
            void endVoiceSession();
            window.alert("Voice session failed. Use HTTPS, allow the mic, and allowlist this host in ElevenLabs.");
          },
          onModeChange: ({ mode }) => {
            if (mode === "speaking") {
              callMode.textContent = "Speaking…";
              callMode.className = "speaking";
              callRing.className = "speaking";
            } else {
              callMode.textContent = "Listening…";
              callMode.className = "";
              callRing.className = "";
            }
          }
        };
        if (agent.branchId) opts.branchId = agent.branchId;
        activeConversation = await Conversation.startSession(opts);
      } catch (err) {
        console.error(err);
        callMode.textContent = "Could not start session";
        await endVoiceSession();
      }
    }

    endCallBtn.addEventListener("click", () => void endVoiceSession());
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && callOverlay.classList.contains("active")) void endVoiceSession();
    });

    AGENTS.forEach((agent) => {
      const card = document.createElement("article");
      card.className = "agent-card";
      card.innerHTML =
        '<div class="agent-meta"><strong></strong></div>' +
        '<button type="button" class="btn-voice" aria-label="Start voice: ' +
        agent.name.replace(/"/g, "&quot;") +
        '"><span aria-hidden="true">🌶️</span></button>';
      card.querySelector("strong").textContent = agent.name;
      const btn = card.querySelector(".btn-voice");
      btn.addEventListener("click", (e) => {
        e.stopPropagation();
        void startVoiceSession(agent);
      });
      grid.appendChild(card);
    });
  </script>
</body>
</html>
